<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">
<link rel="apple-touch-icon" href="icon-192.png">

<title>Teproc Track</title>

<style>
body{font-family:Arial;background:#0f172a;color:#fff;padding:15px}
input,button{width:100%;padding:10px;margin:5px 0;border-radius:8px;border:none}
.row{display:flex;gap:10px}
.row div{flex:1}
button{background:#22c55e;color:#000;font-weight:bold}
.resumen-box{background:#111827;padding:10px;border-radius:10px;margin-top:15px}
</style>

</head>

<body>

<h2>Teproc Track</h2>

<select id="techSelect" onchange="updateTech()">
<option value="">Selecciona técnico</option>
<option>Juan</option>
<option>Pedro</option>
</select>

<button onclick="crearVisita()">+ Nueva visita</button>

<div id="visitas"></div>

<div class="resumen-box">
<h3>Resumen del día</h3>
<p>Total servicios: <span id="resumenServicios">0</span></p>
<p>Total desplazamientos: $<span id="resumenDesplaz">0</span></p>
<p>Total repuestos: $<span id="resumenRepuestos">0</span></p>
<p><strong>Total general: $<span id="resumenTotal">0</span></strong></p>
</div>

<button onclick="finalizarDia()">Finalizar día</button>

<script>

let visits = [];
let currentTech = "";

const TARIFA_MINUTO = 1000;
const TARIFA_SERVICIO = 2000;

function updateTech(){
  currentTech = document.getElementById('techSelect').value;
  saveData();
}

function crearVisita(){

  const visit = {
    tiempoDesplaz:0,
    costoDesplaz:0,
    costoRepuestos:0,
    minServicio:0,
    totalServicio:0
  };

  visits.push(visit);
  render();
  saveData();
}

function render(){
  const container = document.getElementById('visitas');
  container.innerHTML = "";

  visits.forEach((v,i)=>{

    container.innerHTML += `
    <div class="resumen-box">

      <h4>Visita ${i+1}</h4>

      <label>Tiempo desplazamiento (min)</label>
      <input type="number" value="${v.tiempoDesplaz}" 
      oninput="updateField(${i},'tiempoDesplaz',this.value)">

      <label>Costo desplazamiento</label>
      <input type="number" value="${v.costoDesplaz}" readonly>

      <label>Min servicio</label>
      <input type="number" value="${v.minServicio}" 
      oninput="updateField(${i},'minServicio',this.value)">

      <label>Costo repuestos</label>
      <input type="number" value="${v.costoRepuestos}" 
      oninput="updateField(${i},'costoRepuestos',this.value)">

      <label>Total</label>
      <input type="number" value="${v.totalServicio}" readonly>

    </div>
    `;
  });

  actualizarResumen();
}

function updateField(i, field, value){

  visits[i][field] = Number(value) || 0;

  // cálculos automáticos
  visits[i].costoDesplaz = visits[i].tiempoDesplaz * TARIFA_MINUTO;
  const costoServicio = visits[i].minServicio * TARIFA_SERVICIO;

  visits[i].totalServicio =
    visits[i].costoDesplaz +
    visits[i].costoRepuestos +
    costoServicio;

  render();
  saveData();
}

function actualizarResumen(){

  let totalServicios = visits.length;
  let totalDesplaz = 0;
  let totalRepuestos = 0;
  let totalGeneral = 0;

  visits.forEach(v=>{
    totalDesplaz += v.costoDesplaz || 0;
    totalRepuestos += v.costoRepuestos || 0;
    totalGeneral += v.totalServicio || 0;
  });

  document.getElementById('resumenServicios').innerText = totalServicios;
  document.getElementById('resumenDesplaz').innerText = totalDesplaz;
  document.getElementById('resumenRepuestos').innerText = totalRepuestos;
  document.getElementById('resumenTotal').innerText = totalGeneral;
}

function saveData(){
  localStorage.setItem('teproc_data', JSON.stringify({visits,currentTech}));
}

function loadData(){
  const data = JSON.parse(localStorage.getItem('teproc_data'));
  if(data){
    visits = data.visits || [];
    currentTech = data.currentTech || '';
    document.getElementById('techSelect').value = currentTech;
    render();
  }
}

function finalizarDia(){

  if(visits.length===0){
    alert("No hay datos");
    return;
  }

  alert("Datos listos para enviar a Sheets");

  visits = [];
  saveData();
  render();
}

loadData();

</script>

</body>
</html>
